events {
    worker_connections 1024;
}

http {
    # 1. Define Rate Limiting Zone
    # 'binary_remote_addr' uses client IP (10MB zone can hold ~160,000 IPs)
    # rate=5r/s means 5 requests per second allowed per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # 2. Load Balancing group
    upstream backend_api {
        server api:8000;
    }

    server {
        listen 80;

        # Frontend Routing
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API Routing with Rate Limiting
        location /api {
            # Apply rate limiting
            # 'burst=10' allows a user to occasionally exceed the limit for 10 requests
            # 'nodelay' ensures those burst requests aren't queued/slowed down
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Custom error if rate limit is hit (Status 429)
            limit_req_status 429;
        }
    }
}

